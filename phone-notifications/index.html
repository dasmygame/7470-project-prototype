<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phone Notifications Swipe Clear</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="phone" role="application" aria-label="Phone notifications demo">
        <div class="screen">
          <header class="header">
            <div class="time">9:41</div>
            <div class="status" aria-hidden="true">
              <span class="pill">5G</span>
              <span class="pill">LTE</span>
              <span class="pill">BAT</span>
            </div>
          </header>

          <main class="list" id="list" aria-live="polite">
            <div class="card" data-id="email" data-type="email">
              <div class="icon">@</div>
              <div class="meta">
                <div class="title">Email</div>
                <div class="body">New message from Sam</div>
                <div class="actions" aria-label="Email actions">
                  <button class="actionBtn" type="button" data-notif="email" data-action="read">Read</button>
                  <button class="actionBtn" type="button" data-notif="email" data-action="delete">Delete</button>
                </div>
              </div>
              <div class="right">
                <div class="time">09:12</div>
              </div>
            </div>

            <div class="card" data-id="text" data-type="text">
              <div class="icon">T</div>
              <div class="meta">
                <div class="title">Text</div>
                <div class="body">"Running 5 minutes late"</div>
                <div class="actions" aria-label="Text actions">
                  <button class="actionBtn" type="button" data-notif="text" data-action="read">Read</button>
                  <button class="actionBtn" type="button" data-notif="text" data-action="delete">Delete</button>
                </div>
              </div>
              <div class="right">
                <div class="time">09:18</div>
              </div>
            </div>

            <div class="card" data-id="reminder" data-type="reminder">
              <div class="icon">!</div>
              <div class="meta">
                <div class="title">Reminder</div>
                <div class="body">Pay rent</div>
                <div class="actions" aria-label="Reminder actions">
                  <button class="actionBtn" type="button" data-notif="reminder" data-action="stop">Stop</button>
                  <button class="actionBtn" type="button" data-notif="reminder" data-action="reset">Reset</button>
                </div>
              </div>
              <div class="right">
                <div class="time">Today</div>
              </div>
            </div>

            <div class="card" data-id="alarm" data-type="alarm">
              <div class="icon">A</div>
              <div class="meta">
                <div class="title">Alarm</div>
                <div class="body">Wake up (demo)</div>
                <div class="actions" aria-label="Alarm actions">
                  <button class="actionBtn" type="button" data-notif="alarm" data-action="stop">Stop</button>
                  <button class="actionBtn" type="button" data-notif="alarm" data-action="reset">Reset</button>
                </div>
              </div>
              <div class="right">
                <div class="time">06:00</div>
              </div>
            </div>

            <div id="emptyState" class="empty hidden" aria-hidden="true">
              <div class="emptyTitle">All caught up</div>
              <div class="emptyBody">Glide over options to clear (demo).</div>
            </div>

            <div id="glideHint" class="glideHint" aria-hidden="true">Glide over an option button to resolve</div>
          </main>

          <footer class="footer">
            <button class="btn secondary" id="resetBtn" type="button">
              Reset demo
            </button>
          </footer>
        </div>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
